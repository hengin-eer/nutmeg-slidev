<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NUTMEG Slide Design Systemの部品カタログ" />
    <title>NUTMEG Slide Design System</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <main class="catalog-shell">
      <header class="catalog-hero">
        <img class="catalog-logo" src="./brand/logo_mark_horizontal_color.svg" alt="NUTMEG" />
        <p class="eyebrow">SLIDE DESIGN SYSTEM <span>v{{VERSION}}</span></p>
        <h1>部品を探し、<br />実際のスライドで確かめる。</h1>
        <p class="hero-copy">検索、用途、実物プレビューから、資料に合う一つの部品を選びます。</p>
        <div class="hero-actions">
          <a class="button button--primary" href="./slides/">スライド全体を見る</a>
          <a class="button" href="https://www.npmjs.com/package/@timdaik/slidev-theme-nutmeg">npmで使う</a>
        </div>
      </header>

      <section class="catalog-controls" aria-label="カタログを絞り込む">
        <label class="search-field">
          <span class="sr-only">部品を検索</span>
          <input id="catalog-search" type="search" placeholder="部品名・用途・キーワードで検索" autocomplete="off" />
        </label>
        <div id="catalog-filters" class="filter-list" aria-label="カテゴリ"></div>
      </section>

      <section aria-live="polite">
        <p id="result-summary" class="result-summary"></p>
        <div id="catalog-items" class="catalog-grid"></div>
      </section>
    </main>

    <dialog id="preview-dialog" class="preview-dialog" aria-label="スライドプレビュー">
      <div class="preview-dialog__bar">
        <p id="preview-title"></p>
        <div>
          <a id="preview-open" class="dialog-link" target="_blank" rel="noreferrer">新しいタブで開く</a>
          <button id="preview-close" class="icon-button" type="button" aria-label="プレビューを閉じる">×</button>
        </div>
      </div>
      <iframe id="preview-frame" title="Slidev slide preview" loading="lazy"></iframe>
    </dialog>
    <script src="./catalog.js"></script>
  </body>
</html>
