name: Verify theme

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.4.0
        with:
          node-version: 24.15.0
          cache: npm
      - run: npm install --global npm@11.18.0
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run check:package
      - run: npm run check:create

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: PRタイトルをConventional Commits形式で検証
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          pattern='^(feat|fix|perf|deps|docs|chore|refactor|test|build|ci|revert)(\([[:alnum:]_.\/-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PRタイトルは '<type>: <summary>' 形式にしてください。例: feat: カタログを更新"
            echo "現在のタイトル: $PR_TITLE"
            exit 1
          fi
