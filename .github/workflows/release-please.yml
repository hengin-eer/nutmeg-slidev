name: Prepare release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please用トークンを確認
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "::error::Repository secret RELEASE_PLEASE_TOKEN が未設定です。公開運用ドキュメントに従ってFine-grained PATを登録してください。"
            exit 1
          fi
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: npmステージ公開を開始
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ steps.release.outputs.tag_name }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type=stage-npm-release \
            -f "client_payload[ref]=$RELEASE_REF" \
            -f "client_payload[package]=all"
