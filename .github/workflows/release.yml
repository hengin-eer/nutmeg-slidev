name: Stage npm release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.4.0
        with:
          node-version: 24.14.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Stage unpublished packages
        run: |
          stage_if_unpublished() {
            package="$1"
            version="$(node -p "require('./packages/' + process.argv[1] + '/package.json').version" "$2")"
            if npm view "${package}@${version}" version >/dev/null 2>&1; then
              echo "${package}@${version} is already published; skipping."
            else
              npm stage publish --workspace="${package}" --access public
            fi
          }
          stage_if_unpublished @timdaik/slidev-theme-nutmeg slidev-theme
          stage_if_unpublished @timdaik/create-nutmeg-slides create-nutmeg-slides
