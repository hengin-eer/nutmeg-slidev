name: Stage npm release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.4.0
        with:
          node-version: 24.14.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm stage publish --workspace=@timdaik/slidev-theme-nutmeg --access public
      - run: npm stage publish --workspace=@timdaik/create-nutmeg-slides --access public
