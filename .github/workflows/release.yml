name: Stage npm release

on:
  workflow_call:
    inputs:
      ref:
        description: "ステージ対象のGit参照"
        required: true
        type: string
      package:
        description: "ステージ対象（all | theme | create）"
        required: false
        default: all
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "ステージ対象のGit参照"
        required: true
        default: main
        type: string
      package:
        description: "ステージ対象"
        required: true
        default: all
        type: choice
        options: [all, theme, create]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-stage-${{ inputs.ref }}-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  stage:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.4.0
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org
      - name: Install npm with staged publishing support
        run: npm install --global npm@11.18.0
      - name: Verify npm staged publishing support
        run: |
          node --version
          npm --version
          npm stage --help
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Stage unpublished packages
        env:
          TARGET_PACKAGE: ${{ inputs.package }}
        run: |
          stage_if_unpublished() {
            directory="$1"
            package="$(node -p "require('./' + process.argv[1] + '/package.json').name" "$directory")"
            version="$(node -p "require('./' + process.argv[1] + '/package.json').version" "$directory")"

            if npm view "${package}@${version}" version >/dev/null 2>&1; then
              echo "${package}@${version} is already published; skipping."
              echo "- ${package}@${version}: 公開済みのためskip" >> "$GITHUB_STEP_SUMMARY"
            else
              (
                cd "$directory"
                npm stage publish --access public
              )
              echo "- ${package}@${version}: npmへステージ済み" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          echo "## npmステージ公開" >> "$GITHUB_STEP_SUMMARY"
          echo "対象ref: \`${{ inputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          case "$TARGET_PACKAGE" in
            all)
              stage_if_unpublished packages/slidev-theme
              stage_if_unpublished packages/create-nutmeg-slides
              ;;
            theme) stage_if_unpublished packages/slidev-theme ;;
            create) stage_if_unpublished packages/create-nutmeg-slides ;;
            *) echo "Unknown package selector: $TARGET_PACKAGE" >&2; exit 1 ;;
          esac
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "npmjs.comのStaged Packagesで内容を確認し、2FAで承認してください。" >> "$GITHUB_STEP_SUMMARY"
